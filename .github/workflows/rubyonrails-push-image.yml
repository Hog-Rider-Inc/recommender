name: Build and Push Rails Image

on:
  workflow_run:
    workflows: ["Ruby on Rails CI"]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/hog-rider-inc/svc-recommender:latest .

      - name: Push image
        run: |
          docker push ghcr.io/hog-rider-inc/svc-recommender:latest
