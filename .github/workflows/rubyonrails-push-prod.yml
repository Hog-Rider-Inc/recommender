name: Promote to Prod

# Trigger only after CI workflow succeeds
on:
  workflow_run:
    workflows: ["Ruby on Rails CI"]
    types:
      - completed

jobs:
  promote:
    # Only run if the CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # Important to push properly

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push main → prod
        run: |
          # Make sure prod branch exists locally
          git fetch origin prod:prod || git checkout -b prod
          git checkout prod
          # Reset prod to main
          git reset --hard origin/main
          # Push prod branch
          git push origin prod --force
